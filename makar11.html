<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ШПИОНСКИЙ КВЕСТ — МАКАР 11</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        body {
            font-family: 'Press Start 2P', system-ui;
        }
        .neon {
            text-shadow: 
                0 0 5px #22ff88,
                0 0 10px #22ff88,
                0 0 20px #22ff88;
        }
        .scanline::after {
            content: '';
            position: absolute;
            top: -100%;
            left: 0;
            width: 100%;
            height: 200%;
            background: linear-gradient(
                to bottom,
                transparent 40%,
                rgba(34, 255, 136, 0.15) 50%,
                transparent 60%
            );
            animation: scan 3.5s linear infinite;
            pointer-events: none;
        }
        @keyframes scan {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(300%); }
        }
        .tile {
            transition: transform 0.15s, background-color 0.15s;
        }
        canvas {
            image-rendering: pixelated;
            box-shadow: 0 0 30px #22ff88;
        }
    </style>
</head>
<body class="bg-black text-emerald-400 min-h-screen flex items-center justify-center p-2">
    <div id="app" class="w-full max-w-md bg-zinc-950 border-4 border-emerald-500 rounded-xl overflow-hidden shadow-2xl shadow-emerald-900/70 relative scanline">
        
        <!-- HEADER -->
        <div class="bg-zinc-900 p-4 border-b-4 border-emerald-500 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-emerald-500 text-black rounded-xl flex items-center justify-center text-3xl">🕵️</div>
                <div>
                    <div class="text-xl font-bold tracking-widest neon">ОПЕРАЦИЯ 11</div>
                    <div class="text-[10px] text-emerald-500/70 -mt-1">ЗЕЛЁНЫЙ ОСТРОВ • ОМСК</div>
                </div>
            </div>
            <button onclick="toggleMute()" id="muteBtn" class="text-4xl hover:scale-110 active:scale-90 transition">🔊</button>
        </div>

        <!-- PROGRESS -->
        <div class="flex bg-black/70 p-3 gap-2 overflow-x-auto border-b border-emerald-500/30">
            <div id="progressDots" class="flex gap-2"></div>
        </div>

        <!-- CONTENT -->
        <div id="content" class="min-h-[520px] p-5 relative"></div>

        <!-- FOOTER BAR -->
        <div class="absolute bottom-0 left-0 right-0 bg-zinc-900 border-t-4 border-emerald-500 p-3 flex justify-center">
            <button onclick="repeatVoice()" class="flex items-center gap-2 px-6 py-3 bg-emerald-900 hover:bg-emerald-700 rounded-lg text-sm">
                <span class="text-xl">🔊</span> ПОВТОРИТЬ
            </button>
        </div>
    </div>

    <script>
        // ================== STATE ==================
        let currentStep = parseInt(localStorage.getItem('makarQuestStep')) || 1;
        let solvedRiddlesCount = parseInt(localStorage.getItem('makarRiddles')) || 0;
        let currentRiddle = 0;

        const riddles = [
            {q: "Что имеет ключи, но не открывает двери?", a: "пианино"},
            {q: "Что можно увидеть с закрытыми глазами?", a: "сон"},
            {q: "Что становится мокрым, когда сушит?", a: "полотенце"},
            {q: "У кого есть шея, но нет головы?", a: "бутылка"},
            {q: "Что имеет зубы, но ничего не жуёт?", a: "гребень"},
            {q: "Что идёт, но никогда не приходит?", a: "время"},
            {q: "Что можно сломать, не дотронувшись?", a: "обещание"},
            {q: "Что имеет корни, но не растёт?", a: "волосы"},
            {q: "Что летает без крыльев?", a: "время"},
            {q: "Что имеет голову, но нет мозга?", a: "булавка"},
            {q: "Что имеет много листьев, но не дерево?", a: "книга"}
        ];

        // ================== AUDIO ==================
        let audioContext;
        let isMuted = false;
        let bgInterval;

        function initAudio() {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
        }

        function playTone(freq, duration, type = 'sine', vol = 0.3) {
            if (isMuted || !audioContext) return;
            const osc = audioContext.createOscillator();
            const gain = audioContext.createGain();
            osc.type = type;
            osc.frequency.value = freq;
            gain.gain.value = vol;
            osc.connect(gain).connect(audioContext.destination);
            osc.start();
            osc.stop(audioContext.currentTime + duration);
        }

        function playClick() {
            playTone(1200, 0.03, 'square', 0.2);
        }

        function playSuccess() {
            [880, 1100, 1320, 1760].forEach((f, i) => {
                setTimeout(() => playTone(f, 0.25, 'sine', 0.4), i * 70);
            });
        }

        function playError() {
            playTone(180, 0.6, 'sawtooth', 0.5);
        }

        function startGeiger() {
            if (isMuted || bgInterval) return;
            bgInterval = setInterval(() => {
                if (Math.random() > 0.55) {
                    playTone(2400 + Math.random() * 1800, 0.04, 'square', 0.07);
                }
            }, 180);
        }

        function toggleMute() {
            isMuted = !isMuted;
            document.getElementById('muteBtn').textContent = isMuted ? '🔇' : '🔊';
            if (!isMuted) startGeiger();
            else clearInterval(bgInterval);
        }

        // ================== TTS ==================
        function speak(text) {
            if ('speechSynthesis' in window) {
                const u = new SpeechSynthesisUtterance(text);
                u.lang = 'ru-RU';
                u.rate = 0.92;
                u.pitch = 1.08;
                speechSynthesis.speak(u);
            }
        }

        function repeatVoice() {
            const el = document.getElementById('voiceText');
            if (el) speak(el.textContent);
        }

        // ================== PUZZLE 15 ==================
        let tiles = [];
        let emptyIndex = 15;

        function isSolvable(arr) {
            let inv = 0;
            for (let i = 0; i < 16; i++) {
                if (arr[i] === 15) continue;
                for (let j = i + 1; j < 16; j++) {
                    if (arr[j] !== 15 && arr[i] > arr[j]) inv++;
                }
            }
            return inv % 2 === 0;
        }

        function shuffle15() {
            do {
                tiles = Array.from({length: 16}, (_, i) => i);
                tiles.sort(() => Math.random() - 0.5);
                emptyIndex = tiles.indexOf(15);
            } while (!isSolvable(tiles));
        }

        function render15() {
            const grid = document.getElementById('puzzle15');
            grid.innerHTML = '';
            tiles.forEach((val, i) => {
                const div = document.createElement('div');
                div.className = `tile w-20 h-20 flex items-center justify-center text-4xl border-2 border-emerald-400 bg-zinc-900 ${val === 15 ? 'opacity-0' : 'cursor-pointer hover:bg-emerald-950'}`;
                div.textContent = val === 15 ? '' : val + 1;
                div.onclick = () => {
                    playClick();
                    if (Math.abs(i - emptyIndex) === 1 || Math.abs(i - emptyIndex) === 4) {
                        [tiles[i], tiles[emptyIndex]] = [tiles[emptyIndex], tiles[i]];
                        emptyIndex = i;
                        render15();
                        if (tiles.every((v, idx) => v === idx || v === 15)) {
                            playSuccess();
                            setTimeout(() => goToStep(3), 900);
                        }
                    }
                };
                grid.appendChild(div);
            });
        }

        // ================== ARKANOID ==================
        let arkCanvas, arkCtx, paddleX = 110, ballX = 160, ballY = 280, ballDX = 3.5, ballDY = -3.5;
        let bricks = [];
        let arkRunning = false;

        function initArkanoid() {
            arkCanvas = document.getElementById('arkanoid');
            arkCtx = arkCanvas.getContext('2d');
            paddleX = 110;
            ballX = 160; ballY = 280; ballDX = 3.5; ballDY = -3.5;
            
            bricks = [];
            const text = "СДРМАКАР";
            let bx = 35;
            for (let i = 0; i < text.length; i++) {
                bricks.push({
                    x: bx + i * 32,
                    y: 70 + Math.floor(i / 4) * 35,
                    w: 28,
                    h: 22,
                    alive: true,
                    char: text[i]
                });
            }
        }

        function drawArkanoid() {
            arkCtx.fillStyle = '#111827';
            arkCtx.fillRect(0, 0, 320, 420);
            
            // Paddle
            arkCtx.fillStyle = '#34d399';
            arkCtx.fillRect(paddleX, 380, 90, 14);
            
            // Ball
            arkCtx.beginPath();
            arkCtx.arc(ballX, ballY, 9, 0, Math.PI*2);
            arkCtx.fillStyle = '#facc15';
            arkCtx.fill();
            
            // Bricks
            bricks.forEach(b => {
                if (b.alive) {
                    arkCtx.fillStyle = b.char === 'А' ? '#f472b6' : '#34d399';
                    arkCtx.fillRect(b.x, b.y, b.w, b.h);
                    arkCtx.fillStyle = '#111827';
                    arkCtx.font = 'bold 16px monospace';
                    arkCtx.fillText(b.char, b.x + 7, b.y + 17);
                }
            });
        }

        function updateArkanoid() {
            if (!arkRunning) return;
            
            ballX += ballDX;
            ballY += ballDY;
            
            // Walls
            if (ballX < 10 || ballX > 310) ballDX *= -1;
            if (ballY < 10) ballDY *= -1;
            
            // Paddle
            if (ballY > 370 && ballY < 390 && ballX > paddleX && ballX < paddleX + 90) {
                ballDY = -Math.abs(ballDY);
                ballDX += (ballX - (paddleX + 45)) * 0.12;
            }
            
            // Lose ball
            if (ballY > 430) {
                playError();
                ballY = 280;
                ballX = 160;
                ballDY = -3.5;
            }
            
            // Bricks
            let remaining = 0;
            bricks.forEach(b => {
                if (!b.alive) return;
                remaining++;
                if (ballX > b.x && ballX < b.x + b.w && ballY > b.y && ballY < b.y + b.h) {
                    b.alive = false;
                    ballDY *= -1;
                    playSuccess();
                    
                    if (b.char === 'А') {
                        // Bonus - extra speed
                        ballDY *= 1.1;
                    }
                }
            });
            
            if (remaining === 0) {
                arkRunning = false;
                playSuccess();
                setTimeout(() => goToStep(6), 1400);
            }
            
            drawArkanoid();
        }

        // ================== SNAKE ==================
        let snakeCanvas, snakeCtx, snake = [{x:5,y:5}], dirX=1, dirY=0, foodX, foodY, snakeLengthGoal = 11, snakeInterval;

        function placeFoodSnake() {
            do {
                foodX = Math.floor(Math.random() * 11);
                foodY = Math.floor(Math.random() * 11);
            } while (snake.some(s => s.x === foodX && s.y === foodY));
        }

        function initSnake() {
            snake = [{x:5, y:5}];
            dirX = 1; dirY = 0;
            placeFoodSnake();
        }

        function drawSnake() {
            snakeCtx.fillStyle = '#111827';
            snakeCtx.fillRect(0, 0, 242, 242);
            
            snake.forEach((part, i) => {
                snakeCtx.fillStyle = i === 0 ? '#34d399' : '#10b981';
                snakeCtx.fillRect(part.x * 22 + 1, part.y * 22 + 1, 20, 20);
            });
            
            snakeCtx.fillStyle = '#ec4899';
            snakeCtx.fillRect(foodX * 22 + 5, foodY * 22 + 5, 12, 12);
        }

        function updateSnake() {
            const head = {x: snake[0].x + dirX, y: snake[0].y + dirY};
            
            // Collision
            if (head.x < 0 || head.x > 10 || head.y < 0 || head.y > 10 || snake.some(s => s.x === head.x && s.y === head.y)) {
                clearInterval(snakeInterval);
                playError();
                if (confirm('ЗМЕЙКА ПОГИБЛА! Ещё раз?')) {
                    initSnake();
                    snakeInterval = setInterval(updateSnake, 170);
                }
                return;
            }
            
            snake.unshift(head);
            
            if (head.x === foodX && head.y === foodY) {
                playSuccess();
                placeFoodSnake();
                if (snake.length >= snakeLengthGoal) {
                    clearInterval(snakeInterval);
                    playSuccess();
                    setTimeout(() => goToStep(9), 700);
                }
            } else {
                snake.pop();
            }
            
            drawSnake();
        }

        // ================== NAVIGATION ==================
        function saveProgress() {
            localStorage.setItem('makarQuestStep', currentStep);
            localStorage.setItem('makarRiddles', solvedRiddlesCount);
        }

        function renderProgress() {
            const container = document.getElementById('progressDots');
            container.innerHTML = '';
            for (let i = 1; i <= 9; i++) {
                const dot = document.createElement('div');
                dot.className = `w-7 h-7 rounded-full flex items-center justify-center text-xs border-2 flex-shrink-0 ${i < currentStep ? 'bg-emerald-500 text-black border-emerald-500' : i === currentStep ? 'border-emerald-400 ring-2 ring-offset-2 ring-offset-zinc-950 ring-emerald-400' : 'border-zinc-700'}`;
                dot.textContent = i;
                container.appendChild(dot);
            }
        }

        function renderStep() {
            renderProgress();
            const content = document.getElementById('content');
            let html = '';

            switch (currentStep) {
                case 1:
                    html = `
                        <div class="text-center">
                            <div class="text-6xl mb-6">📡</div>
                            <h1 class="text-3xl neon mb-8">АКТИВИРУЙ КАНАЛ</h1>
                            <div id="voiceText" class="text-xl leading-relaxed min-h-[120px]">${riddles[currentRiddle].q}</div>
                            <input id="riddleAns" class="block w-full mt-8 bg-zinc-900 border-2 border-emerald-500 focus:border-white p-5 text-xl text-center outline-none" placeholder="ВВЕДИ ОТВЕТ">
                            <button onclick="submitRiddle()" class="mt-6 w-full py-6 text-xl font-bold bg-emerald-500 hover:bg-emerald-400 active:bg-white text-black">ПРОВЕРИТЬ</button>
                            <div class="mt-8 text-xs opacity-60">10 минут на подсказку</div>
                        </div>
                    `;
                    break;

                case 2:
                    html = `
                        <div>
                            <h2 class="text-center text-2xl mb-6">ПЯТНАШКИ</h2>
                            <div id="puzzle15" class="grid grid-cols-4 gap-1.5 mx-auto" style="max-width: 340px"></div>
                            <div class="text-center text-xs mt-8 opacity-70">Собери 1 → 15</div>
                        </div>
                    `;
                    break;

                case 3:
                    html = `
                        <div class="text-center py-8">
                            <div class="text-7xl mb-6">🏚️</div>
                            <h2 class="text-2xl mb-8">ЗДАНИЕ OGT</h2>
                            <input id="pwd3" type="text" class="w-full p-8 text-2xl bg-zinc-900 border-2 border-emerald-400 text-center" placeholder="КОД">
                            <button onclick="checkCode(3, 'КОМПАС')" class="mt-8 w-full py-7 text-xl bg-emerald-500 text-black font-bold">ВВЕСТИ КОД</button>
                        </div>
                    `;
                    break;

                case 4:
                    html = `
                        <div class="text-center py-8">
                            <div class="text-7xl mb-6">🪺</div>
                            <h2 class="text-2xl mb-8">СВОЙ СКВОРЕЧНИК</h2>
                            <input id="pwd4" type="text" class="w-full p-8 text-2xl bg-zinc-900 border-2 border-emerald-400 text-center" placeholder="КОД">
                            <button onclick="checkCode(4, 'КЕДР')" class="mt-8 w-full py-7 text-xl bg-emerald-500 text-black font-bold">ВВЕСТИ КОД</button>
                        </div>
                    `;
                    break;

                case 5:
                    html = `
                        <div>
                            <h2 class="text-center mb-3 text-2xl">АРКАНОИД</h2>
                            <canvas id="arkanoid" width="320" height="420" class="mx-auto rounded border-4 border-emerald-500"></canvas>
                            <div class="flex justify-center gap-8 mt-4">
                                <button onclick="movePaddle(-42)" class="text-5xl px-6 py-4 bg-zinc-900 active:bg-emerald-900">◀</button>
                                <button onclick="movePaddle(42)" class="text-5xl px-6 py-4 bg-zinc-900 active:bg-emerald-900">▶</button>
                            </div>
                        </div>
                    `;
                    break;

                case 6:
                    html = `
                        <div class="text-center py-8">
                            <div class="text-7xl mb-6">🌳</div>
                            <h2 class="text-2xl mb-8">КОРНЕ-ПНИ</h2>
                            <input id="pwd6" type="text" class="w-full p-8 text-2xl bg-zinc-900 border-2 border-emerald-400 text-center" placeholder="КОД">
                            <button onclick="checkCode(6, 'MAYDAY')" class="mt-8 w-full py-7 text-xl bg-emerald-500 text-black font-bold">ВВЕСТИ КОД</button>
                        </div>
                    `;
                    break;

                case 7:
                    html = `
                        <div class="text-center py-8">
                            <div class="text-7xl mb-6">🛶</div>
                            <h2 class="text-2xl mb-8">ПЛОТ ПИРАТА</h2>
                            <input id="pwd7" type="text" class="w-full p-8 text-2xl bg-zinc-900 border-2 border-emerald-400 text-center" placeholder="КОД">
                            <button onclick="checkCode(7, 'ГОТОВО')" class="mt-8 w-full py-7 text-xl bg-emerald-500 text-black font-bold">ВВЕСТИ КОД</button>
                        </div>
                    `;
                    break;

                case 8:
                    html = `
                        <div>
                            <h2 class="text-center text-2xl mb-4">ЗМЕЙКА 11</h2>
                            <canvas id="snake" width="242" height="242" class="mx-auto rounded border-4 border-emerald-500"></canvas>
                            <div class="text-center text-xs mt-4 opacity-70">Собери 11 блоков</div>
                        </div>
                    `;
                    break;

                case 9:
                    html = `
                        <div class="text-center py-12">
                            <div class="text-[110px] leading-none mb-4">🎉</div>
                            <h1 class="text-5xl neon mb-6">С ДНЁМ РОЖДЕНИЯ,<br>МАКАР!</h1>
                            <p class="text-2xl mb-10">Тебе 11 лет!<br>Ты — настоящий ШПИОН!</p>
                            <div class="text-6xl mb-8">🔥🏕️</div>
                            <p class="text-xl">Клад ждёт тебя в палатке у костра.<br>Отличного приключения!</p>
                        </div>
                    `;
                    break;
            }
            content.innerHTML = html;

            // Init per-step
            if (currentStep === 2) {
                shuffle15();
                render15();
            }
            if (currentStep === 5) {
                initArkanoid();
                arkRunning = true;
                setInterval(() => {
                    if (arkRunning) updateArkanoid();
                }, 1000 / 58);
            }
            if (currentStep === 8) {
                snakeCanvas = document.getElementById('snake');
                snakeCtx = snakeCanvas.getContext('2d');
                initSnake();
                drawSnake();
                snakeInterval = setInterval(updateSnake, 165);
            }

            if (currentStep < 9) speak(`Шаг ${currentStep}. Переходи дальше.`);
            saveProgress();
        }

        function goToStep(n) {
            currentStep = n;
            renderStep();
        }

        function submitRiddle() {
            playClick();
            const ans = document.getElementById('riddleAns').value.trim().toLowerCase();
            const correct = riddles[currentRiddle].a.toLowerCase();
            
            if (ans === correct || ans.includes(correct)) {
                playSuccess();
                solvedRiddlesCount++;
                currentRiddle++;
                if (currentRiddle >= riddles.length) {
                    goToStep(2);
                } else {
                    renderStep();
                }
            } else {
                playError();
                alert('НЕВЕРНО! Попробуй ещё раз.');
            }
        }

        function checkCode(step, correctAnswer) {
            playClick();
            let input = document.getElementById(`pwd${step}`).value.trim().toUpperCase().replace(/\s/g, '');
            if (input === correctAnswer) {
                playSuccess();
                goToStep(step + 1);
            } else {
                playError();
                alert('КОД НЕВЕРНЫЙ');
            }
        }

        function movePaddle(delta) {
            playClick();
            paddleX += delta;
            if (paddleX < 10) paddleX = 10;
            if (paddleX > 220) paddleX = 220;
        }

        // Keyboard support
        document.addEventListener('keydown', e => {
            if (currentStep === 5) {
                if (e.key === 'ArrowLeft') movePaddle(-45);
                if (e.key === 'ArrowRight') movePaddle(45);
            }
            if (currentStep === 8) {
                if (e.key === 'ArrowLeft' && dirX !== 1) { dirX = -1; dirY = 0; }
                if (e.key === 'ArrowRight' && dirX !== -1) { dirX = 1; dirY = 0; }
                if (e.key === 'ArrowUp' && dirY !== 1) { dirX = 0; dirY = -1; }
                if (e.key === 'ArrowDown' && dirY !== -1) { dirX = 0; dirY = 1; }
            }
        });

        // INIT
        window.onload = () => {
            initAudio();
            startGeiger();
            renderStep();
            
            // Welcome
            setTimeout(() => {
                speak("Добро пожаловать в шпионский квест, Макар! Активируй канал и начнём приключение на косе парка Зеленый остров.");
            }, 1200);
        };
    </script>
</body>
</html>
